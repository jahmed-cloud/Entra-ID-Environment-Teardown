name: Entra ID Environment Teardown

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      RUN_MODE:
        description: "Execution Mode (dry-run or execute)"
        required: true
        default: "dry-run"
      TARGET_DOMAIN:
        required: true
      ADMIN_UPNS:
        required: true
      BREAKGLASS_UPNS:
        required: true
      EXCLUDE_GROUPS:
        required: false
      EXCLUDE_APPS:
        required: false
      EXCLUDE_CAPS:
        required: false
      EXCLUDE_NAMED_LOCATIONS:
        required: false

env:
  EXPECTED_DOMAIN: ${{ github.event.inputs.TARGET_DOMAIN || vars.ENTRA_TARGET_DOMAIN }}
  ADMIN_ACCOUNTS: ${{ github.event.inputs.ADMIN_UPNS || vars.ADMIN_UPNS }}
  BREAKGLASS_ACCOUNTS: ${{ github.event.inputs.BREAKGLASS_UPNS || vars.BREAKGLASS_UPNS }}
  EXCLUDE_GROUPS: ${{ github.event.inputs.EXCLUDE_GROUPS || vars.EXCLUDE_GROUPS }}
  EXCLUDE_APPS: ${{ github.event.inputs.EXCLUDE_APPS || vars.EXCLUDE_APPS }}
  EXCLUDE_CAPS: ${{ github.event.inputs.EXCLUDE_CAPS || vars.EXCLUDE_CAPS }}
  EXCLUDE_NAMED_LOCATIONS: ${{ github.event.inputs.EXCLUDE_NAMED_LOCATIONS || vars.EXCLUDE_NAMED_LOCATIONS }}

jobs:
  teardown:
    name: Entra Teardown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Install PowerShell (ARM + x64 safe)
      # -------------------------
      - name: Ensure PowerShell
        shell: bash
        run: |
          set -e

          if command -v pwsh >/dev/null 2>&1; then
            echo "PowerShell already installed: $(pwsh -v)"
            exit 0
          fi

          echo "Installing PowerShell..."

          sudo apt-get update
          sudo apt-get install -y curl tar libicu-dev

          ARCH=$(uname -m)
          if [[ "$ARCH" == "aarch64" ]]; then
            PS_ARCH="arm64"
          else
            PS_ARCH="x64"
          fi

          VERSION="7.4.6"
          FILE="powershell-${VERSION}-linux-${PS_ARCH}.tar.gz"
          URL="https://github.com/PowerShell/PowerShell/releases/download/v${VERSION}/${FILE}"

          curl -L $URL -o /tmp/powershell.tar.gz
          sudo mkdir -p /opt/microsoft/powershell/7
          sudo tar zxf /tmp/powershell.tar.gz -C /opt/microsoft/powershell/7
          sudo chmod +x /opt/microsoft/powershell/7/pwsh
          sudo ln -s /opt/microsoft/powershell/7/pwsh /usr/bin/pwsh

          pwsh -v

      # -------------------------
      # Install Graph Modules (only if missing)
      # -------------------------
      - name: Install Microsoft Graph Modules
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $modules = @(
            "Microsoft.Graph.Authentication",
            "Microsoft.Graph.Identity.DirectoryManagement",
            "Microsoft.Graph.Users",
            "Microsoft.Graph.Identity.SignIns",
            "Microsoft.Graph.Identity.Governance",
            "Microsoft.Graph.Groups",
            "Microsoft.Graph.Applications"
          )

          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          foreach ($m in $modules) {
            if (-not (Get-Module -ListAvailable -Name $m)) {
              Write-Host "Installing $m..."
              Install-Module $m -Scope CurrentUser -Force -AllowClobber
            } else {
              Write-Host "$m already installed"
            }
          }

      # -------------------------
      # Execute Script
      # -------------------------
      - name: Execute Teardown Script
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: |
          $isDryRun = "${{ github.event_name }}" -eq "pull_request" -or ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.RUN_MODE }}" -eq "dry-run")

          $args = @(
            "-TenantId", $env:TENANT_ID,
            "-ClientId", $env:CLIENT_ID,
            "-ClientSecret", $env:CLIENT_SECRET,
            "-ExpectedTenantDomain", $env:EXPECTED_DOMAIN,
            "-AdminAccounts", ($env:ADMIN_ACCOUNTS -split ','),
            "-BreakGlassAccounts", ($env:BREAKGLASS_ACCOUNTS -split ','),
            "-ExcludeGroups", ($env:EXCLUDE_GROUPS -split ','),
            "-ExcludeApps", ($env:EXCLUDE_APPS -split ','),
            "-ExcludeCAPs", ($env:EXCLUDE_CAPS -split ','),
            "-ExcludeNamedLocations", ($env:EXCLUDE_NAMED_LOCATIONS -split ',')
          )

          if ($isDryRun) {
            Write-Host "Running DRY RUN"
            ./Reset-EntraTenant.ps1 @args -WhatIf
          } else {
            Write-Host "Running LIVE EXECUTION"
            ./Reset-EntraTenant.ps1 @args
          }

      # -------------------------
      # Upload Logs (FIXED v4)
      # -------------------------
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teardown-logs
          path: ./*.log
