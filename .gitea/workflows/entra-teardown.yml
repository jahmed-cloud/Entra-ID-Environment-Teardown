name: Entra ID Environment Teardown

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  EXPECTED_DOMAIN: ${{ vars.ENTRA_TARGET_DOMAIN }}
  ADMIN_ACCOUNTS: ${{ vars.ADMIN_UPNS }}
  BREAKGLASS_ACCOUNTS: ${{ vars.BREAKGLASS_UPNS }}
  EXCLUDE_GROUPS: ${{ vars.EXCLUDE_GROUPS }}
  EXCLUDE_APPS: ${{ vars.EXCLUDE_APPS }}
  EXCLUDE_CAPS: ${{ vars.EXCLUDE_CAPS }}
  EXCLUDE_NAMED_LOCATIONS: ${{ vars.EXCLUDE_NAMED_LOCATIONS }}

jobs:

  teardown:
    name: Entra Teardown (Unified Job)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # Fast PowerShell Setup (only if missing)
      # -------------------------
      - name: Ensure PowerShell
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            echo "Installing PowerShell..."
            apt-get update
            apt-get install -y powershell
          else
            echo "PowerShell already installed"
          fi

      # -------------------------
      # Smart Graph Install (cached locally if runner reused)
      # -------------------------
      - name: Install Graph Modules (Smart)
        shell: pwsh
        run: |
          $modules = @(
            "Microsoft.Graph.Authentication",
            "Microsoft.Graph.Identity.DirectoryManagement",
            "Microsoft.Graph.Users",
            "Microsoft.Graph.Identity.SignIns",
            "Microsoft.Graph.Identity.Governance",
            "Microsoft.Graph.Groups",
            "Microsoft.Graph.Applications"
          )

          foreach ($m in $modules) {
            if (-not (Get-Module -ListAvailable -Name $m)) {
              Write-Host "Installing $m..."
              Install-Module $m -Scope CurrentUser -Force -AllowClobber
            } else {
              Write-Host "$m already installed"
            }
          }

      # -------------------------
      # Decide Mode (Dry vs Execute)
      # -------------------------
      - name: Set Execution Mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ gitea.event_name }}" == "pull_request" ]]; then
            echo "mode=dry" >> $GITHUB_OUTPUT
          else
            echo "mode=execute" >> $GITHUB_OUTPUT
          fi

      # -------------------------
      # Run Script
      # -------------------------
      - name: Run Teardown Script
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: |
          if ("${{ steps.mode.outputs.mode }}" -eq "dry") {
            Write-Host "Running DRY RUN"
            ./Reset-EntraTenant.ps1 `
              -TenantId $env:TENANT_ID `
              -ClientId $env:CLIENT_ID `
              -ClientSecret $env:CLIENT_SECRET `
              -ExpectedTenantDomain $env:EXPECTED_DOMAIN `
              -AdminAccounts ($env:ADMIN_ACCOUNTS -split ',') `
              -BreakGlassAccounts ($env:BREAKGLASS_ACCOUNTS -split ',') `
              -ExcludeGroups ($env:EXCLUDE_GROUPS -split ',') `
              -ExcludeApps ($env:EXCLUDE_APPS -split ',') `
              -ExcludeCAPs ($env:EXCLUDE_CAPS -split ',') `
              -ExcludeNamedLocations ($env:EXCLUDE_NAMED_LOCATIONS -split ',') `
              -WhatIf
          }
          else {
            Write-Host "Running LIVE EXECUTION"
            ./Reset-EntraTenant.ps1 `
              -TenantId $env:TENANT_ID `
              -ClientId $env:CLIENT_ID `
              -ClientSecret $env:CLIENT_SECRET `
              -ExpectedTenantDomain $env:EXPECTED_DOMAIN `
              -AdminAccounts ($env:ADMIN_ACCOUNTS -split ',') `
              -BreakGlassAccounts ($env:BREAKGLASS_ACCOUNTS -split ',') `
              -ExcludeGroups ($env:EXCLUDE_GROUPS -split ',') `
              -ExcludeApps ($env:EXCLUDE_APPS -split ',') `
              -ExcludeCAPs ($env:EXCLUDE_CAPS -split ',') `
              -ExcludeNamedLocations ($env:EXCLUDE_NAMED_LOCATIONS -split ',')
          }

      # -------------------------
      # Always upload logs
      # -------------------------
      - name: Upload Logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: teardown-logs
          path: ./*.log
