name: Entra ID Environment Teardown

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      RUN_MODE:
        description: 'Execution Mode (dry-run or execute)'
        required: true
        default: 'dry-run'
      TARGET_DOMAIN:
        required: true
      ADMIN_UPNS:
        required: true
      BREAKGLASS_UPNS:
        required: true
      EXCLUDE_GROUPS:
        required: false
      EXCLUDE_APPS:
        required: false
      EXCLUDE_CAPS:
        required: false
      EXCLUDE_NAMED_LOCATIONS:
        required: false

# Define environment variables used across jobs. 
# It uses UI inputs if available, otherwise falls back to Repo Variables.
env:
  EXPECTED_DOMAIN: ${{ github.event.inputs.TARGET_DOMAIN || vars.ENTRA_TARGET_DOMAIN }} 
  ADMIN_ACCOUNTS: ${{ github.event.inputs.ADMIN_UPNS || vars.ADMIN_UPNS }}           
  BREAKGLASS_ACCOUNTS: ${{ github.event.inputs.BREAKGLASS_UPNS || vars.BREAKGLASS_UPNS }} 
  EXCLUDE_GROUPS: ${{ github.event.inputs.EXCLUDE_GROUPS || vars.EXCLUDE_GROUPS }}
  EXCLUDE_APPS: ${{ github.event.inputs.EXCLUDE_APPS || vars.EXCLUDE_APPS }}
  EXCLUDE_CAPS: ${{ github.event.inputs.EXCLUDE_CAPS || vars.EXCLUDE_CAPS }}                       
  EXCLUDE_NAMED_LOCATIONS: ${{ github.event.inputs.EXCLUDE_NAMED_LOCATIONS || vars.EXCLUDE_NAMED_LOCATIONS }} 

jobs:
  dry-run:
    name: Dry Run (WhatIf)
    runs-on: ubuntu-latest
    # Trigger on PR OR if the Web App explicitly requests a dry-run
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.RUN_MODE == 'dry-run')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PowerShell Core (ARM64 Direct Binary)
        shell: bash
        run: |
          # Install dependencies required by PowerShell on Linux (.NET needs libicu)
          apt-get update && apt-get install -y curl tar libicu-dev
          
          # Download the official ARM64 binary for PowerShell 7.4.x
          curl -L -o /tmp/powershell.tar.gz https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-arm64.tar.gz
          
          # Create the target directory, extract, and set permissions
          mkdir -p /opt/microsoft/powershell/7
          tar zxf /tmp/powershell.tar.gz -C /opt/microsoft/powershell/7
          chmod +x /opt/microsoft/powershell/7/pwsh
          
          # Create the symlink so the 'pwsh' command works globally
          ln -sf /opt/microsoft/powershell/7/pwsh /usr/bin/pwsh

      - name: Install Microsoft Graph PowerShell Module
        shell: pwsh
        run: |
          Set-PSRepository -Name "PSGallery" -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication, Microsoft.Graph.Identity.DirectoryManagement, Microsoft.Graph.Users, Microsoft.Graph.Identity.SignIns, Microsoft.Graph.Identity.Governance, Microsoft.Graph.Groups, Microsoft.Graph.Applications -Force -AllowClobber -Scope CurrentUser

      - name: Execute Teardown Script (Dry Run)
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: |
          ./Reset-EntraTenant.ps1 `
            -TenantId $env:TENANT_ID `
            -ClientId $env:CLIENT_ID `
            -ClientSecret $env:CLIENT_SECRET `
            -ExpectedTenantDomain $env:EXPECTED_DOMAIN `
            -AdminAccounts ($env:ADMIN_ACCOUNTS -split ',') `
            -BreakGlassAccounts ($env:BREAKGLASS_ACCOUNTS -split ',') `
            -ExcludeGroups ($env:EXCLUDE_GROUPS -split ',') `
            -ExcludeApps ($env:EXCLUDE_APPS -split ',') `
            -ExcludeCAPs ($env:EXCLUDE_CAPS -split ',') `
            -ExcludeNamedLocations ($env:EXCLUDE_NAMED_LOCATIONS -split ',') `
            -WhatIf

      - name: Upload Dry-Run Transcript
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: DryRun-Transcript
          path: ./*.log

  execute-teardown:
    name: Execute Teardown (Destructive)
    runs-on: ubuntu-latest
    # Trigger on Push to Main OR if the Web App explicitly requests execution
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.RUN_MODE == 'execute')
    environment: 
      name: production-teardown
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PowerShell Core (ARM64 Direct Binary)
        shell: bash
        run: |
          # Install dependencies required by PowerShell on Linux (.NET needs libicu)
          apt-get update && apt-get install -y curl tar libicu-dev
          
          # Download the official ARM64 binary for PowerShell 7.4.x
          curl -L -o /tmp/powershell.tar.gz https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-arm64.tar.gz
          
          # Create the target directory, extract, and set permissions
          mkdir -p /opt/microsoft/powershell/7
          tar zxf /tmp/powershell.tar.gz -C /opt/microsoft/powershell/7
          chmod +x /opt/microsoft/powershell/7/pwsh
          
          # Create the symlink so the 'pwsh' command works globally
          ln -sf /opt/microsoft/powershell/7/pwsh /usr/bin/pwsh

      - name: Install Microsoft Graph PowerShell Module
        shell: pwsh
        run: |
          Set-PSRepository -Name "PSGallery" -InstallationPolicy Trusted
          Install-Module Microsoft.Graph.Authentication, Microsoft.Graph.Identity.DirectoryManagement, Microsoft.Graph.Users, Microsoft.Graph.Identity.SignIns, Microsoft.Graph.Identity.Governance, Microsoft.Graph.Groups, Microsoft.Graph.Applications -Force -AllowClobber -Scope CurrentUser

      - name: Execute Teardown Script (Live)
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
        run: |
          ./Reset-EntraTenant.ps1 `
            -TenantId $env:TENANT_ID `
            -ClientId $env:CLIENT_ID `
            -ClientSecret $env:CLIENT_SECRET `
            -ExpectedTenantDomain $env:EXPECTED_DOMAIN `
            -AdminAccounts ($env:ADMIN_ACCOUNTS -split ',') `
            -BreakGlassAccounts ($env:BREAKGLASS_ACCOUNTS -split ',') `
            -ExcludeGroups ($env:EXCLUDE_GROUPS -split ',') `
            -ExcludeApps ($env:EXCLUDE_APPS -split ',') `
            -ExcludeCAPs ($env:EXCLUDE_CAPS -split ',') `
            -ExcludeNamedLocations ($env:EXCLUDE_NAMED_LOCATIONS -split ',')

      - name: Upload Execution Transcript
        uses: actions/upload-artifact@v3
        if: always() 
        with:
          name: Execution-Transcript
          path: ./*.log
